<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGLV INTERIOR - Gallery</title>

<style>

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f8fafc;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 25px;
  background:white;
  border-bottom:1px solid #eee;
}

.logo img{
  height:45px;
}

.title{
  font-size:24px;
  font-weight:bold;
  color:#0E3A43;
}

.consult-btn{
  padding:8px 18px;
  border:2px solid #0E3A43;
  border-radius:25px;
  text-decoration:none;
  color:#0E3A43;
  font-weight:bold;
}

.consult-btn:hover{
  background:#0E3A43;
  color:white;
}

/* CATEGORY BUTTONS */
.gallery-buttons{
  text-align:center;
  margin:25px 0;
}

.gallery-buttons button{
  padding:8px 14px;
  margin:5px;
  border:none;
  cursor:pointer;
  background:#0E3A43;
  color:white;
  border-radius:20px;
}

.gallery-buttons button:hover{
  background:black;
}

/* SLIDER */
.slider{
  width:90%;
  max-width:950px;
  margin:auto;
  overflow:hidden;
  border-radius:20px;
  background:white;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.slider-track{
  display:flex;
  transition:0.5s;
}

.slider-track img{
  width:100%;
  height:480px;
  object-fit:cover;
  flex-shrink:0;
}

/* BACK BUTTON */
.back-btn{
  display:block;
  text-align:center;
  margin:25px auto;
  width:180px;
  padding:10px;
  border-radius:30px;
  background:black;
  color:white;
  text-decoration:none;
  font-weight:bold;
}

.back-btn:hover{
  background:#0E3A43;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="logo">
    <!-- 🔥 FULL LOGO FILE use cheyandi -->
    <img src="images/logo-full.png" alt="DGLV Interior">
  </div>

  <div class="title">Our Gallery</div>

  <!-- 🔥 IMPORTANT BUTTON -->
  <a href="index.html?openForm=true#contact" class="consult-btn">
    Get Free Consultation
  </a>

</div>

<!-- CATEGORY BUTTONS -->
<div class="gallery-buttons">
  <button onclick="showCategory('living')">Living Room</button>
  <button onclick="showCategory('kitchen')">Modular Kitchen</button>
  <button onclick="showCategory('bedroom')">Bedroom</button>
  <button onclick="showCategory('wardrobe')">Wardrobe</button>
  <button onclick="showCategory('ceiling')">False Ceiling</button>
  <button onclick="showCategory('office')">Office Interior</button>
</div>

<!-- SLIDER -->
<div class="slider">
  <div class="slider-track" id="sliderTrack"></div>
</div>

<a class="back-btn" href="index.html">⬅ Back to Home</a>

<script>

const galleryImages = {
  living: ["images/living1.jpg", "images/living2.jpg", "images/living3.jpg"],
  kitchen: ["images/kitchen1.jpg", "images/kitchen2.jpg", "images/kitchen3.jpg"],
  bedroom: ["images/bedroom1.jpg", "images/bedroom2.jpg", "images/bedroom3.jpg"],
  wardrobe: ["images/wardrobe1.jpg", "images/wardrobe2.jpg", "images/wardrobe3.jpg"],
  ceiling: ["images/ceiling1.jpg", "images/ceiling2.jpg", "images/ceiling3.jpg"],
  office: ["images/office1.jpg", "images/office2.jpg", "images/office3.jpg"]
};

let currentCategory="living";
let currentIndex=0;
let sliderInterval;

const sliderTrack=document.getElementById("sliderTrack");

function loadImages(category){
  sliderTrack.innerHTML="";
  
  galleryImages[category].forEach(img=>{
    let image=document.createElement("img");
    image.src=img;
    sliderTrack.appendChild(image);
  });

  currentIndex=0;
  sliderTrack.style.transform="translateX(0%)";
}

function nextSlide(){
  let total=galleryImages[currentCategory].length;
  currentIndex++;

  if(currentIndex>=total){
    currentIndex=0;
  }

  sliderTrack.style.transform="translateX(-"+(currentIndex*100)+"%)";
}

function showCategory(category){
  currentCategory=category;
  loadImages(category);

  clearInterval(sliderInterval);
  sliderInterval=setInterval(nextSlide,2500);
}

loadImages("living");
sliderInterval=setInterval(nextSlide,2500);

</script>

</body>
</html>
