<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGLV INTERIOR - Gallery</title>

<style>
@font-face{
  font-family:"kitamiw01";
  src:url("fonts/kitamiw01-regular.ttf") format("truetype");
}

body{
  margin:0;
  font-family:"kitamiw01", Arial, sans-serif;
  background:#f8fafc;
}

/* HEADER */
.nav{
  background:#082e3b;
  padding:15px;
  text-align:center;
  color:white;
  font-size:24px;
  font-weight:bold;
}

/* BUTTONS */
.gallery-buttons{
  text-align:center;
  margin:30px 0;
}

.gallery-buttons button{
  padding:12px 22px;
  margin:6px;
  border-radius:999px;

  background:transparent; /* 🔥 transparent */
  color:#082e3b;

  border:2px solid #082e3b;

  font-weight:900;
  font-size:14px;

  cursor:pointer;
  transition:all 0.3s ease;

  font-family:"kitamiw01", Arial, sans-serif;
}

/* HOVER EFFECT */
.gallery-buttons button:hover{
  background:#082e3b;
  color:white;

  transform:scale(1.08); /* 🔥 zoom */

  box-shadow:0 8px 20px rgba(8,46,59,0.4);
}

/* SLIDER */
.slider{
  width:90%;
  max-width:900px;
  margin:auto;
  overflow:hidden;
  border-radius:20px;
  background:white;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.slider-track{
  display:flex;
  transition:transform 0.6s ease;
}

.slider-track img{
  width:100%;
  height:450px;
  object-fit:cover;
  flex:0 0 100%;
}

/* BACK BUTTON */
.back-btn{
  display:block;
  text-align:center;
  margin:25px auto;
  width:220px;
  padding:14px;

  border-radius:999px;

  background:transparent;
  color:#082e3b;

  border:2px solid #082e3b;

  font-weight:900;
  text-decoration:none;

  transition:all 0.3s ease;
}

.back-btn:hover{
  background:#082e3b;
  color:white;
  transform:scale(1.08);
  box-shadow:0 8px 20px rgba(8,46,59,0.4);
}
</style>
</head>

<body>

<div class="nav">DGLV INTERIOR - Gallery</div>

<div class="gallery-buttons">
  <button onclick="showCategory('living')">Living Room</button>
  <button onclick="showCategory('kitchen')">Modular Kitchen</button>
  <button onclick="showCategory('bedroom')">Bedroom</button>
  <button onclick="showCategory('wardrobe')">Wardrobe</button>
  <button onclick="showCategory('ceiling')">False Ceiling</button>
  <button onclick="showCategory('office')">Office Interior</button>
</div>

<div class="slider">
  <div class="slider-track" id="sliderTrack"></div>
</div>

<a href="index.html" class="back-btn">⬅ Back to Home</a>

<script>
const galleryImages = {
  living: ["images/living1.jpg","images/living2.jpg","images/living3.jpg"],
  kitchen: ["images/kitchen1.jpg","images/kitchen2.jpg","images/kitchen3.jpg"],
  bedroom: ["images/bedroom1.jpg","images/bedroom2.jpg","images/bedroom3.jpg"],
  wardrobe: ["images/wardrobe1.jpg","images/wardrobe2.jpg","images/wardrobe3.jpg"],
  ceiling: ["images/ceiling1.jpg","images/ceiling2.jpg","images/ceiling3.jpg"],
  office: ["images/office1.jpg","images/office2.jpg","images/office3.jpg"]
};

let currentCategory="living";
let currentIndex=0;
let interval;

const sliderTrack=document.getElementById("sliderTrack");

function loadImages(category){
  sliderTrack.innerHTML="";

  galleryImages[category].forEach(src=>{
    const img=document.createElement("img");
    img.src=src;
    sliderTrack.appendChild(img);
  });

  currentIndex=0;
  sliderTrack.style.transform="translateX(0)";
}

function nextSlide(){
  const total=galleryImages[currentCategory].length;
  currentIndex++;

  if(currentIndex>=total) currentIndex=0;

  sliderTrack.style.transform="translateX(-"+(currentIndex*100)+"%)";
}

function showCategory(category){
  currentCategory=category;
  loadImages(category);

  clearInterval(interval);
  interval=setInterval(nextSlide,2500);
}

loadImages("living");
interval=setInterval(nextSlide,2500);
</script>

</body>
</html>
