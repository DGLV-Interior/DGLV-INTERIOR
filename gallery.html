<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery | DGLV Interior</title>

<style>
body {
    margin: 0;
    font-family: inherit;
    background: #f5f5f5;
}

/* HEADER */
.header {
    background: #082e3b;
    padding: 15px;
    text-align: center;
}
.header img {
    height: 60px;
}

/* CATEGORY BUTTONS */
.categories {
    text-align: center;
    margin: 30px 0;
}
.categories button {
    background: #082e3b;
    color: white;
    border: none;
    padding: 10px 20px;
    margin: 5px;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
}
.categories button:hover {
    background: #0b4456;
}

/* GALLERY */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

.item {
    width: 300px;
    overflow: hidden;
    border-radius: 20px;
    transition: 0.4s;
    position: relative;
}

.item img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    transition: 0.4s;
}

/* HOVER EFFECT */
.item:hover img {
    transform: scale(1.1);
}

/* HIDE ITEMS */
.hide {
    display: none;
}

/* BUTTONS */
.buttons {
    text-align: center;
    margin: 40px 0;
}

.back-btn {
    background: #082e3b;
    color: white;
    padding: 12px 30px;
    border-radius: 30px;
    text-decoration: none;
    display: inline-block;
    margin: 10px;
}

.consult-btn {
    background: #082e3b;
    color: white;
    padding: 14px 35px;
    border-radius: 40px;
    text-decoration: none;
    display: inline-block;
    margin: 10px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="logo.png" alt="DGLV Interior">
</div>

<!-- CATEGORY BUTTONS -->
<div class="categories">
    <button onclick="filterSelection('all')">All</button>
    <button onclick="filterSelection('living')">Living Room</button>
    <button onclick="filterSelection('kitchen')">Modular Kitchen</button>
    <button onclick="filterSelection('bedroom')">Bedroom</button>
    <button onclick="filterSelection('wardrobe')">Wardrobe</button>
    <button onclick="filterSelection('ceiling')">False Ceiling</button>
    <button onclick="filterSelection('office')">Office Interior</button>
</div>

<!-- GALLERY -->
<div class="gallery">

    <div class="item living"><img src="images/living1.jpg"></div>
    <div class="item living"><img src="images/living2.jpg"></div>

    <div class="item kitchen"><img src="images/kitchen1.jpg"></div>
    <div class="item kitchen"><img src="images/kitchen2.jpg"></div>

    <div class="item bedroom"><img src="images/bedroom1.jpg"></div>

    <div class="item wardrobe"><img src="images/wardrobe1.jpg"></div>

    <div class="item ceiling"><img src="images/ceiling1.jpg"></div>

    <div class="item office"><img src="images/office1.jpg"></div>

</div>

<!-- BUTTONS -->
<div class="buttons">

    <!-- BACK TO HOME -->
    <a href="https://dglvinterior.com/" class="back-btn">← Back to Home</a>

    <!-- CONSULTATION -->
    <a href="https://dglvinterior.com/?openPopup=true" class="consult-btn">
        Get Free Consultation
    </a>

</div>

<script>

/* FILTER FUNCTION */
function filterSelection(category) {
    let items = document.getElementsByClassName("item");

    for (let i = 0; i < items.length; i++) {
        items[i].classList.add("hide");

        if (category === "all" || items[i].classList.contains(category)) {
            items[i].classList.remove("hide");
        }
    }
}

/* DEFAULT SHOW ALL */
filterSelection("all");

</script>

</body>
</html>
