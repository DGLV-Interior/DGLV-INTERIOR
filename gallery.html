<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGLV INTERIOR - Gallery</title>

<style>

@font-face{
  font-family: "kitamiw01";
  src: url("fonts/kitamiw01-regular.ttf") format("truetype");
}

/* BODY */
body{
  margin:0;
  font-family:"kitamiw01", Arial, sans-serif;
  background:#f8fafc;
}

/* 🔥 HEADER NEW */
.gallery-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:#082e3b;
}

/* LOGO */
.gallery-left img{
  height:50px;
}

/* BUTTON SAME STYLE */
.nav-btn{
  background:transparent;
  color:#ffffff;
  border:2px solid #ffffff;
  border-radius:999px;
  padding:10px 22px;
  font-weight:900;
  cursor:pointer;
  transition:0.3s;
}

.nav-btn:hover{
  background:#ffffff;
  color:#082e3b;
}

/* TITLE */
.gallery-title{
  text-align:center;
  color:white;
  background:#082e3b;
  margin:0;
  padding-bottom:15px;
  font-size:28px;
}

/* CATEGORY BUTTONS */
.gallery-buttons{
  text-align:center;
  margin:30px 0;
}

.gallery-buttons button{
  padding:10px 16px;
  margin:6px;
  border:none;
  cursor:pointer;
  background:#082e3b;
  color:white;
  font-weight:bold;
  border-radius:25px;
  font-family:"kitamiw01", Arial, sans-serif;
}

.gallery-buttons button:hover{
  background:black;
}

/* SLIDER */
.slider{
  width:90%;
  max-width:950px;
  margin:auto;
  overflow:hidden;
  border-radius:20px;
  border:1px solid rgba(0,0,0,0.1);
  background:white;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.slider-track{
  display:flex;
  transition:transform 0.7s ease-in-out;
}

.slider-track img{
  width:100%;
  height:500px;
  object-fit:cover;
  flex-shrink:0;
}

/* BACK BUTTON */
.back-btn{
  display:block;
  text-align:center;
  margin:25px auto;
  width:200px;
  padding:12px;
  border-radius:30px;
  background:black;
  color:white;
  text-decoration:none;
  font-weight:bold;
}

.back-btn:hover{
  background:#082e3b;
}

</style>
</head>

<body>

<!-- 🔥 HEADER -->
<div class="gallery-header">

  <div class="gallery-left">
    <a href="/">
      <img src="images/logo-full.png">
    </a>
  </div>

  <div class="gallery-right">
    <!-- 👉 CLICK → INDEX + POPUP -->
    <button class="nav-btn" onclick="window.location.href='/?openPopup=true'">
      Get Free Consultation
    </button>
  </div>

</div>

<h1 class="gallery-title">Our Gallery</h1>

<!-- BUTTONS -->
<div class="gallery-buttons">
  <button onclick="showCategory('living')">Living Room</button>
  <button onclick="showCategory('kitchen')">Modular Kitchen</button>
  <button onclick="showCategory('bedroom')">Bedroom</button>
  <button onclick="showCategory('wardrobe')">Wardrobe</button>
  <button onclick="showCategory('ceiling')">False Ceiling</button>
  <button onclick="showCategory('office')">Office Interior</button>
</div>

<!-- SLIDER -->
<div class="slider">
  <div class="slider-track" id="sliderTrack"></div>
</div>

<a class="back-btn" href="index.html">⬅ Back to Home</a>

<script>

const galleryImages = {
  living: ["images/living1.jpg","images/living2.jpg","images/living3.jpg"],
  kitchen: ["images/kitchen1.jpg","images/kitchen2.jpg","images/kitchen3.jpg"],
  bedroom: ["images/bedroom1.jpg","images/bedroom2.jpg","images/bedroom3.jpg"],
  wardrobe: ["images/wardrobe1.jpg","images/wardrobe2.jpg","images/wardrobe3.jpg"],
  ceiling: ["images/ceiling1.jpg","images/ceiling2.jpg","images/ceiling3.jpg"],
  office: ["images/office1.jpg","images/office2.jpg","images/office3.jpg"]
};

let currentCategory="living";
let currentIndex=0;
let sliderInterval;

const sliderTrack=document.getElementById("sliderTrack");

function loadImages(category){
  sliderTrack.innerHTML="";

  galleryImages[category].forEach(img=>{
    let image=document.createElement("img");
    image.src=img;
    sliderTrack.appendChild(image);
  });

  currentIndex=0;
  sliderTrack.style.transform="translateX(0%)";
}

function nextSlide(){
  let total=galleryImages[currentCategory].length;
  currentIndex++;

  if(currentIndex>=total){
    currentIndex=0;
  }

  sliderTrack.style.transform="translateX(-"+(currentIndex*100)+"%)";
}

function showCategory(category){
  currentCategory=category;
  loadImages(category);

  clearInterval(sliderInterval);
  sliderInterval=setInterval(nextSlide,2500);
}

loadImages("living");
sliderInterval=setInterval(nextSlide,2500);

</script>

</body>
</html>
