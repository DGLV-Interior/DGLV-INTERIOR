<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DGLV Interior Gallery</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@font-face{
  font-family:"kitamiw01";
  src:url("fonts/kitamiw01-regular.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"kitamiw01", Arial;
}

body{
  background:#f8fafc;
  text-align:center;
}

/* CATEGORY BUTTONS */
.categories{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:12px;
  padding:20px;
}

.categories button{
  padding:10px 18px;
  border-radius:999px;
  border:none;
  background:#082e3b;
  color:#fff;
  font-weight:900;
  cursor:pointer;
}

.categories button.active{
  background:#fff;
  color:#082e3b;
  border:2px solid #082e3b;
}

/* SLIDER CONTAINER */
.slider-container{
  width:90%;
  margin:20px auto;
  overflow:hidden;
  border-radius:20px;
  position:relative;
}

.slider{
  display:flex;
  transition:0.6s ease;
}

.slide{
  min-width:100%;
}

.slide img{
  width:100%;
  height:420px;
  object-fit:cover;
  border-radius:20px;
}

/* HOVER SLIDE */
.slider-container:hover .slider{
  animation:slideMove 6s infinite;
}

@keyframes slideMove{
  0%{transform:translateX(0);}
  33%{transform:translateX(-100%);}
  66%{transform:translateX(-200%);}
  100%{transform:translateX(0);}
}

/* BACK BUTTON */
.back-btn{
  margin:20px;
  display:inline-block;
  padding:12px 26px;
  border-radius:999px;
  background:#082e3b;
  color:#fff;
  text-decoration:none;
  font-weight:900;
}

/* BUTTON */
.btn{
  margin:30px;
  padding:12px 28px;
  border-radius:999px;
  background:#082e3b;
  color:#fff;
  border:none;
  font-weight:900;
  cursor:pointer;
}

/* POPUP */
.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:#fff;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:400px;
}

.popup-box input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

.close{
  float:right;
  cursor:pointer;
  font-size:22px;
}
</style>

</head>

<body>

<a href="/" class="back-btn">← Back to Home</a>

<!-- CATEGORY BUTTONS -->
<div class="categories">
  <button onclick="showCategory(0)" class="active">Living Room</button>
  <button onclick="showCategory(1)">Modular Kitchen</button>
  <button onclick="showCategory(2)">Bedroom</button>
</div>

<!-- SLIDER -->
<div class="slider-container">
  <div class="slider" id="slider">

    <!-- LIVING -->
    <div class="slide"><img src="images/living1.jpg"></div>
    <div class="slide"><img src="images/living2.jpg"></div>
    <div class="slide"><img src="images/living3.jpg"></div>

  </div>
</div>

<button class="btn" onclick="openPopup()">Get Free Consultation</button>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <span class="close" onclick="closePopup()">&times;</span>
    <h3>Get Quote</h3>

    <form onsubmit="sendToWhatsApp(event)">
      <input type="text" placeholder="Name" required>
      <input type="tel" placeholder="Phone" required>
      <button class="btn">Submit</button>
    </form>
  </div>
</div>

<script>

/* CATEGORY IMAGES */
const data = [
  ["images/living1.jpg","images/living2.jpg","images/living3.jpg"],
  ["images/kitchen1.jpg","images/kitchen2.jpg","images/kitchen3.jpg"],
  ["images/bedroom1.jpg","images/bedroom2.jpg","images/bedroom3.jpg"]
];

function showCategory(index){
  const slider = document.getElementById("slider");
  slider.innerHTML = "";

  data[index].forEach(img=>{
    slider.innerHTML += `<div class="slide"><img src="${img}"></div>`;
  });

  document.querySelectorAll(".categories button").forEach(btn=>{
    btn.classList.remove("active");
  });

  document.querySelectorAll(".categories button")[index].classList.add("active");
}

/* POPUP */
function openPopup(){
  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

/* WHATSAPP */
function sendToWhatsApp(e){
  e.preventDefault();

  let text = "Hello DGLV Interior, I need details";
  window.open("https://wa.me/919666141369?text="+encodeURIComponent(text));
}

</script>

</body>
</html>
