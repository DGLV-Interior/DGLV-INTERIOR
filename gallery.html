<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGLV Interior Gallery</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

@font-face{
  font-family:"kitamiw01";
  src:url("fonts/kitamiw01-regular.ttf");
}

:root{
  --navy:#082e3b;
  --gold:#b99474;
  --bg:#f0eeeb;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"kitamiw01", serif;
}

body{
  background:var(--bg);
}

/* 🔥 HEADER LINTEL STYLE */
.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-end; /* 🔥 key for alignment */
  padding:10px 28px 0 28px; /* 🔥 bottom padding removed */
  background:#efefef;
  border-bottom:2px solid #dcdcdc; /* 🔥 lintel line */
}

.logo img{
  height:60px; /* tuned for perfect touch */
  display:block;
}

/* BUTTON */
.header-btn{
  margin-bottom:10px; /* align with logo bottom */
  padding:10px 24px;
  border-radius:999px;
  background:var(--navy);
  color:#fff;
  border:none;
  font-weight:900;
  cursor:pointer;
}

.header-btn:hover{
  background:var(--gold);
}

/* MAIN */
.main-content{
  padding:30px 20px;
}

/* CATEGORY */
.categories{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:25px;
}

.cat-btn{
  padding:10px 18px;
  border-radius:999px;
  border:1px solid var(--navy);
  background:var(--navy);
  color:#fff;
  font-weight:900;
  cursor:pointer;
}

.cat-btn i{
  margin-right:6px;
}

.cat-btn:hover{
  background:var(--gold);
  border-color:var(--gold);
}

/* SLIDER */
.slider-wrap{
  position:relative;
  overflow:hidden;
  border-radius:20px;
  box-shadow:0 15px 60px rgba(0,0,0,0.2);
}

.slider-track{
  display:flex;
  transition:.5s;
}

.slide{
  min-width:100%;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.slide::before{
  content:'';
  position:absolute;
  inset:0;
  background-image:inherit;
  background-size:cover;
  background-position:center;
  filter:blur(25px);
  transform:scale(1.1);
}

.slide img{
  position:relative;
  width:100%;
  height:55vh;
  min-height:350px;
  max-height:600px;
  object-fit:contain;
}

/* ARROWS */
.nav-arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:50px;
  height:50px;
  border-radius:50%;
  background:var(--navy);
  color:#fff;
  border:none;
  cursor:pointer;
}

.nav-arrow:hover{
  background:var(--gold);
}

.prev{ left:15px; }
.next{ right:15px; }

/* DOTS */
.dots{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:rgba(255,255,255,0.5);
}

.dot.active{
  width:28px;
  border-radius:20px;
  background:var(--navy);
}

/* BACK */
.back-row{
  text-align:center;
  margin:30px 0;
}

.back-btn{
  padding:14px 36px;
  background:var(--navy);
  color:#fff;
  border-radius:999px;
  text-decoration:none;
  font-weight:900;
}

.back-btn:hover{
  background:var(--gold);
}

/* TRUST */
.trust-bar{
  background:#fff;
  padding:20px;
}

.trust-inner{
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
}

.trust-item{
  display:flex;
  gap:10px;
  align-items:center;
}

.trust-item i{
  color:var(--gold);
}

.trust-text h4{
  color:var(--navy);
}

/* MOBILE */
@media(max-width:768px){
  .logo img{
    height:50px;
  }

  .header{
    padding:8px 16px 0 16px;
  }

  .header-btn{
    margin-bottom:8px;
    padding:8px 16px;
    font-size:12px;
  }

  .slide img{
    height:40vh;
  }
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="images/logo-full.png">
  </div>
  <button class="header-btn" onclick="goToHome()">Get Free Consultation</button>
</div>

<!-- REMAINING CODE SAME (no changes) -->

<script>
function goToHome(){
  localStorage.setItem("openForm","yes");
  window.location.href="https://dglvinterior.com/";
}
</script>

</body>
</html>
