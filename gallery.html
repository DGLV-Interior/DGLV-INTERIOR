<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGLV INTERIOR - Gallery</title>

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@font-face{
  font-family:"kitamiw01";
  src:url("fonts/kitamiw01-regular.ttf") format("truetype");
}

body{
  margin:0;
  font-family:"kitamiw01", Arial, sans-serif;
  background:#f8fafc;
}

/* ================= NAVBAR ================= */
.nav{
  position:sticky;
  top:0;
  z-index:999;
  background:white;
  border-bottom:1px solid rgba(0,0,0,0.08);
}

.nav-inner{
  display:flex;
  align-items:center;
  padding:10px 20px;
}

.main-logo{
  height:55px;
}

.menu{
  margin-left:auto;
  display:flex;
  gap:15px;
  align-items:center;
}

.dropbtn{
  font-weight:900;
  cursor:pointer;
}

.dropdown-content{
  display:none;
  position:absolute;
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.dropdown-content a{
  display:block;
  padding:8px;
  text-decoration:none;
  color:black;
}

.nav-btn{
  padding:10px 18px;
  border-radius:25px;
  background:#0E3A43;
  color:white;
  border:none;
  cursor:pointer;
}

.menu-btn{
  display:none;
  margin-left:auto;
  font-size:22px;
}

/* MOBILE */
.mobile-menu{
  display:none;
  flex-direction:column;
  padding:10px;
}

/* ================= GALLERY ================= */
.gallery-buttons{
  text-align:center;
  margin:30px 0;
}

.gallery-buttons button{
  padding:10px 16px;
  margin:6px;
  border:none;
  cursor:pointer;
  background:#0E3A43;
  color:white;
  font-weight:bold;
  border-radius:25px;
}

.slider{
  width:90%;
  max-width:900px;
  margin:auto;
  overflow:hidden;
  border-radius:20px;
  background:white;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.slider-track{
  display:flex;
  transition:0.7s;
}

.slider-track img{
  width:100%;
  height:450px;
  object-fit:cover;
}

.back-btn{
  display:block;
  text-align:center;
  margin:25px auto;
  width:200px;
  padding:12px;
  border-radius:30px;
  background:black;
  color:white;
  text-decoration:none;
}

/* ================= POPUP ================= */
.popup{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  top:0;
  left:0;
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:white;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

.popup-box input,
.popup-box button{
  width:100%;
  margin:8px 0;
  padding:10px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
  <div class="nav-inner">

    <a href="index.html">
      <img src="images/logo-full.png" class="main-logo">
    </a>

    <div class="menu">
      <div class="dropdown">
        <div class="dropbtn" id="desktopServicesBtn">
          Services <i class="fa-solid fa-chevron-down"></i>
        </div>

        <div class="dropdown-content" id="desktopDropdown">
          <a href="index.html#reviews">Reviews</a>
          <a href="index.html#faq">FAQ</a>
          <a href="index.html#contact">Contact</a>
          <a href="gallery.html">Our Gallery</a>
        </div>
      </div>

      <button class="nav-btn" id="quoteBtn">Get Free Consultation</button>
    </div>

    <div class="menu-btn" id="menuBtn">
      <i class="fa-solid fa-bars"></i>
    </div>
  </div>

  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html#reviews">Reviews</a>
    <a href="index.html#faq">FAQ</a>
    <a href="index.html#contact">Contact</a>
    <a href="gallery.html">Our Gallery</a>
    <button id="quoteBtnMobile">Get Free Consultation</button>
  </div>
</div>

<!-- GALLERY -->
<div class="gallery-buttons">
  <button onclick="showCategory('living')">Living Room</button>
  <button onclick="showCategory('kitchen')">Kitchen</button>
  <button onclick="showCategory('bedroom')">Bedroom</button>
</div>

<div class="slider">
  <div class="slider-track" id="sliderTrack"></div>
</div>

<a class="back-btn" href="index.html">⬅ Back to Home</a>

<!-- POPUP -->
<div class="popup" id="quotePopup">
  <div class="popup-box">
    <h3>Get Quote</h3>
    <input placeholder="Name">
    <input placeholder="Phone">
    <button>Submit</button>
  </div>
</div>

<script>
const galleryImages={
  living:["images/living1.jpg","images/living2.jpg"],
  kitchen:["images/kitchen1.jpg","images/kitchen2.jpg"],
  bedroom:["images/bedroom1.jpg","images/bedroom2.jpg"]
};

let current="living";
let index=0;

const track=document.getElementById("sliderTrack");

function loadImages(cat){
  track.innerHTML="";
  galleryImages[cat].forEach(img=>{
    let el=document.createElement("img");
    el.src=img;
    track.appendChild(el);
  });
  index=0;
}

function next(){
  index++;
  if(index>=galleryImages[current].length) index=0;
  track.style.transform="translateX(-"+(index*100)+"%)";
}

function showCategory(cat){
  current=cat;
  loadImages(cat);
}

setInterval(next,2500);
loadImages("living");

/* NAV DROPDOWN */
const btn=document.getElementById("desktopServicesBtn");
const menu=document.getElementById("desktopDropdown");

btn.onclick=(e)=>{
  e.stopPropagation();
  menu.style.display=menu.style.display==="block"?"none":"block";
};

document.onclick=()=>menu.style.display="none";

/* MOBILE MENU */
const menuBtn=document.getElementById("menuBtn");
const mobileMenu=document.getElementById("mobileMenu");

menuBtn.onclick=()=>{
  mobileMenu.style.display=
  mobileMenu.style.display==="flex"?"none":"flex";
};

/* POPUP */
const popup=document.getElementById("quotePopup");

document.getElementById("quoteBtn").onclick=()=>popup.style.display="flex";
document.getElementById("quoteBtnMobile").onclick=()=>popup.style.display="flex";

popup.onclick=(e)=>{
  if(e.target===popup) popup.style.display="none";
};
</script>

</body>
</html>
