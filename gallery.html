<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGLV Interior Gallery</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@font-face{
  font-family:"kitamiw01";
  src:url("fonts/kitamiw01-regular.ttf") format("truetype");
  font-weight:normal;
  font-style:normal;
}

:root{
  --navy: #082e3b;
  --gold: #b99474;
  --bg: #f0eeeb;
  --white: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --shadow: 0 8px 32px rgba(0,0,0,0.10);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"kitamiw01", Georgia, serif;
}

html{ scroll-behavior:smooth; }

body{
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ========================
   HEADER
======================== */
.header{
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 36px;
  background: #ffffff;
  box-shadow: 0 2px 14px rgba(0,0,0,0.07);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo img{
  height: 58px;
  width: auto;
  object-fit: contain;
  display: block;
}

.header-btn{
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 12px 28px;
  border-radius: 999px;
  background: var(--navy);
  color: #fff;
  border: none;
  font-weight: 900;
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 0.3px;
}

.header-btn i{
  font-size: 13px;
  transition: transform 0.3s ease;
}

.header-btn:hover{
  background: var(--gold);
  transform: scale(1.04);
}

.header-btn:hover i{
  transform: translateX(4px);
}

/* ========================
   MAIN CONTENT AREA
======================== */
.main-content{
  flex: 1;
  padding: 30px 36px 0;
  max-width: 1400px;
  margin: 0 auto;
  width: 100%;
}

/* ========================
   CATEGORY TABS
======================== */
.categories{
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

.cat-btn{
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 11px 22px;
  border-radius: 999px;
  border: 1.5px solid rgba(8,46,59,0.25);
  background: #ffffff;
  color: var(--navy);
  font-weight: 900;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}

.cat-btn i{
  font-size: 15px;
  color: var(--navy);
  transition: color 0.25s;
}

.cat-btn:hover{
  border-color: var(--navy);
  box-shadow: 0 4px 14px rgba(8,46,59,0.12);
  transform: translateY(-1px);
}

.cat-btn.active{
  background: var(--navy);
  color: #ffffff;
  border-color: var(--navy);
  box-shadow: 0 6px 20px rgba(8,46,59,0.25);
}

.cat-btn.active i{
  color: #ffffff;
}

/* Active dot indicator */
.cat-btn.active::after{
  content: '';
  position: absolute;
  bottom: -2px;
  left: 50%;
  transform: translateX(-50%);
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
}

/* ========================
   SLIDER CONTAINER
======================== */
.slider-wrap{
  position: relative;
  border-radius: 22px;
  overflow: hidden;
  box-shadow: 0 12px 48px rgba(0,0,0,0.14);
  background: #000;
  user-select: none;
}

.slider-track{
  display: flex;
  transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform;
}

.slide{
  min-width: 100%;
  position: relative;
}

.slide img{
  width: 100%;
  height: 420px;
  object-fit: cover;
  display: block;
  transition: opacity 0.3s;
}

/* NAV ARROWS */
.nav-arrow{
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: var(--navy);
  color: #ffffff;
  border: none;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: all 0.25s ease;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}

.nav-arrow:hover{
  background: var(--gold);
  transform: translateY(-50%) scale(1.1);
}

.nav-arrow.prev{ left: 18px; }
.nav-arrow.next{ right: 18px; }

/* DOTS */
.dots{
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 10;
}

.dot{
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.45);
  border: none;
  cursor: pointer;
  transition: all 0.3s ease;
  padding: 0;
}

.dot.active{
  background: var(--navy);
  width: 28px;
  border-radius: 999px;
}

/* ========================
   BACK TO HOME BUTTON ROW
======================== */
.back-row{
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin: 28px 0 30px;
}

.back-line{
  flex: 1;
  max-width: 200px;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold));
  position: relative;
}

.back-line.right{
  background: linear-gradient(to left, transparent, var(--gold));
}

.back-line::after{
  content: '';
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
}

.back-line.right::after{
  left: 0;
  right: auto;
}

.back-btn{
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 36px;
  border-radius: 999px;
  background: var(--navy);
  color: #ffffff;
  text-decoration: none;
  font-weight: 900;
  font-size: 15px;
  font-family: inherit;
  transition: all 0.3s ease;
  box-shadow: 0 6px 20px rgba(8,46,59,0.2);
  letter-spacing: 0.3px;
}

.back-btn:hover{
  background: var(--gold);
  transform: scale(1.04);
  box-shadow: 0 8px 24px rgba(185,148,116,0.3);
}

/* ========================
   TRUST BAR
======================== */
.trust-bar{
  background: #ffffff;
  border-top: 1px solid rgba(0,0,0,0.07);
  padding: 20px 36px;
}

.trust-inner{
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  max-width: 1100px;
  margin: 0 auto;
}

.trust-item{
  flex: 1;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 8px 28px;
  border-right: 1px solid rgba(0,0,0,0.08);
  justify-content: center;
}

.trust-item:last-child{
  border-right: none;
}

.trust-item i{
  font-size: 24px;
  color: var(--gold);
  flex-shrink: 0;
}

.trust-text h4{
  font-size: 14px;
  font-weight: 900;
  color: var(--navy);
  margin-bottom: 2px;
}

.trust-text p{
  font-size: 12px;
  color: var(--muted);
  font-weight: 700;
}

/* ========================
   POPUP
======================== */
.popup{
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  justify-content: center;
  align-items: center;
  z-index: 9999;
  padding: 20px;
}

.popup-box{
  background: #fff;
  padding: 28px;
  border-radius: 22px;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: popIn 0.3s ease;
  position: relative;
}

@keyframes popIn{
  from{ transform:scale(0.88); opacity:0; }
  to{ transform:scale(1); opacity:1; }
}

.popup-box h3{
  font-size: 22px;
  font-weight: 900;
  color: var(--navy);
  margin-bottom: 8px;
}

.popup-box p{
  font-size: 14px;
  color: var(--muted);
  font-weight: 700;
  margin-bottom: 16px;
}

.popup-box input{
  width: 100%;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.15);
  outline: none;
  margin-bottom: 12px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
}

.popup-btn{
  width: 100%;
  padding: 13px;
  border-radius: 999px;
  background: var(--gold);
  color: #fff;
  border: none;
  font-weight: 900;
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.3s ease;
}

.popup-btn:hover{
  background: var(--navy);
  transform: scale(1.03);
}

.close-popup{
  position: absolute;
  top: 14px;
  right: 16px;
  font-size: 22px;
  cursor: pointer;
  color: var(--muted);
  font-weight: 900;
  line-height: 1;
  transition: color 0.2s;
}

.close-popup:hover{ color: var(--navy); }

/* ========================
   RESPONSIVE
======================== */
@media(max-width: 900px){
  .main-content{ padding: 22px 18px 0; }
  .slide img{ height: 320px; }
  .trust-inner{ flex-wrap: wrap; }
  .trust-item{ flex: 0 0 50%; border-right: none; border-bottom: 1px solid rgba(0,0,0,0.07); }
  .trust-item:nth-child(3), .trust-item:nth-child(4){ border-bottom: none; }
}

@media(max-width: 560px){
  .header{ padding: 10px 16px; }
  .header-btn{ padding: 10px 18px; font-size: 13px; }
  .cat-btn{ padding: 9px 14px; font-size: 13px; }
  .slide img{ height: 240px; }
  .back-line{ display: none; }
  .trust-item{ flex: 0 0 100%; border-bottom: 1px solid rgba(0,0,0,0.07); }
  .trust-item:last-child{ border-bottom: none; }
  .trust-bar{ padding: 16px 20px; }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <img src="images/logo-full.png" alt="DGLV Interior">
  </div>
  <button class="header-btn" onclick="goToHome()">
    Get Free Consultation <i class="fa-solid fa-arrow-right"></i>
  </button>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

  <!-- CATEGORY TABS -->
  <div class="categories">
    <button class="cat-btn active" onclick="changeCategory(0, this)">
      <i class="fa-solid fa-couch"></i> Living Room
    </button>
    <button class="cat-btn" onclick="changeCategory(1, this)">
      <i class="fa-solid fa-kitchen-set"></i> Modular Kitchen
    </button>
    <button class="cat-btn" onclick="changeCategory(2, this)">
      <i class="fa-solid fa-bed"></i> Bedroom
    </button>
    <button class="cat-btn" onclick="changeCategory(3, this)">
      <i class="fa-solid fa-door-closed"></i> Wardrobe
    </button>
    <button class="cat-btn" onclick="changeCategory(4, this)">
      <i class="fa-solid fa-layer-group"></i> False Ceiling
    </button>
    <button class="cat-btn" onclick="changeCategory(5, this)">
      <i class="fa-solid fa-building"></i> Office Interior
    </button>
  </div>

  <!-- SLIDER -->
  <div class="slider-wrap">

    <div class="slider-track" id="sliderTrack">
      <div class="slide"><img src="images/living1.jpg" alt="Living Room 1"></div>
      <div class="slide"><img src="images/living2.jpg" alt="Living Room 2"></div>
      <div class="slide"><img src="images/living3.jpg" alt="Living Room 3"></div>
    </div>

    <button class="nav-arrow prev" id="prevBtn" onclick="prevSlide()">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <button class="nav-arrow next" id="nextBtn" onclick="nextSlide()">
      <i class="fa-solid fa-chevron-right"></i>
    </button>

    <div class="dots" id="dotsContainer">
      <button class="dot active" onclick="goToSlide(0)"></button>
      <button class="dot" onclick="goToSlide(1)"></button>
      <button class="dot" onclick="goToSlide(2)"></button>
    </div>

  </div>

  <!-- BACK TO HOME -->
  <div class="back-row">
    <div class="back-line"></div>
    <a href="https://dglvinterior.com/" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>
    <div class="back-line right"></div>
  </div>

</div>

<!-- TRUST BAR -->
<div class="trust-bar">
  <div class="trust-inner">
    <div class="trust-item">
      <i class="fa-solid fa-pen-ruler"></i>
      <div class="trust-text">
        <h4>Bespoke Designs</h4>
        <p>Tailored to your lifestyle</p>
      </div>
    </div>
    <div class="trust-item">
      <i class="fa-solid fa-shield-halved"></i>
      <div class="trust-text">
        <h4>Premium Quality</h4>
        <p>Built to last, crafted with care</p>
      </div>
    </div>
    <div class="trust-item">
      <i class="fa-solid fa-gem"></i>
      <div class="trust-text">
        <h4>Timeless Aesthetics</h4>
        <p>Elegant designs that inspire</p>
      </div>
    </div>
    <div class="trust-item">
      <i class="fa-solid fa-clock"></i>
      <div class="trust-text">
        <h4>On-Time Delivery</h4>
        <p>Committed to your timeline</p>
      </div>
    </div>
  </div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <span class="close-popup" onclick="closePopup()">&times;</span>
    <h3>Get Free Consultation</h3>
    <p>Fill details. We will contact you quickly.</p>
    <form onsubmit="sendToWhatsApp(event)">
      <input type="text" placeholder="Your Full Name" required>
      <input type="tel" placeholder="Mobile Number" required>
      <button type="submit" class="popup-btn">Submit &nbsp;→</button>
    </form>
  </div>
</div>

<script>

/* ========================
   IMAGE DATA
======================== */
const images = [
  ["images/living1.jpg","images/living2.jpg","images/living3.jpg"],
  ["images/kitchen1.jpg","images/kitchen2.jpg","images/kitchen3.jpg"],
  ["images/bedroom1.jpg","images/bedroom2.jpg","images/bedroom3.jpg"],
  ["images/wardrobe1.jpg","images/wardrobe2.jpg","images/wardrobe3.jpg"],
  ["images/ceiling1.jpg","images/ceiling2.jpg","images/ceiling3.jpg"],
  ["images/office1.jpg","images/office2.jpg","images/office3.jpg"]
];

const altLabels = [
  ["Living Room","Living Room","Living Room"],
  ["Modular Kitchen","Modular Kitchen","Modular Kitchen"],
  ["Bedroom","Bedroom","Bedroom"],
  ["Wardrobe","Wardrobe","Wardrobe"],
  ["False Ceiling","False Ceiling","False Ceiling"],
  ["Office Interior","Office Interior","Office Interior"]
];

let currentCategory = 0;
let currentSlide = 0;
let autoTimer = null;

/* ========================
   CHANGE CATEGORY
======================== */
function changeCategory(index, btn){
  currentCategory = index;
  currentSlide = 0;

  // Update active button
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  // Rebuild slider
  buildSlider();
}

function buildSlider(){
  const track = document.getElementById("sliderTrack");
  const dotsContainer = document.getElementById("dotsContainer");
  const imgs = images[currentCategory];

  // Build slides
  track.innerHTML = "";
  imgs.forEach((src, i) => {
    const div = document.createElement("div");
    div.className = "slide";
    const img = document.createElement("img");
    img.src = src;
    img.alt = altLabels[currentCategory][i] || "";
    div.appendChild(img);
    track.appendChild(div);
  });

  // Build dots
  dotsContainer.innerHTML = "";
  imgs.forEach((_, i) => {
    const btn = document.createElement("button");
    btn.className = "dot" + (i === 0 ? " active" : "");
    btn.onclick = () => goToSlide(i);
    dotsContainer.appendChild(btn);
  });

  updateSlider();
  resetAutoPlay();
}

/* ========================
   SLIDE CONTROLS
======================== */
function goToSlide(index){
  const total = images[currentCategory].length;
  currentSlide = (index + total) % total;
  updateSlider();
  resetAutoPlay();
}

function prevSlide(){
  goToSlide(currentSlide - 1);
}

function nextSlide(){
  goToSlide(currentSlide + 1);
}

function updateSlider(){
  const track = document.getElementById("sliderTrack");
  track.style.transform = `translateX(-${currentSlide * 100}%)`;

  document.querySelectorAll(".dot").forEach((dot, i) => {
    dot.classList.toggle("active", i === currentSlide);
  });
}

/* ========================
   AUTO PLAY
======================== */
function resetAutoPlay(){
  if(autoTimer) clearInterval(autoTimer);
  autoTimer = setInterval(() => {
    goToSlide(currentSlide + 1);
  }, 4000);
}

/* ========================
   POPUP
======================== */
function openPopup(){
  document.getElementById("popup").style.display = "flex";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

document.getElementById("popup").addEventListener("click", function(e){
  if(e.target === this) closePopup();
});

/* ========================
   WHATSAPP SUBMIT
======================== */
function sendToWhatsApp(e){
  e.preventDefault();
  const inputs = e.target.querySelectorAll("input");
  const name = inputs[0].value;
  const phone = inputs[1].value;
  const text = `Hello DGLV Interior Team,\nI need interior details.\nName: ${name}\nPhone: ${phone}`;
  window.open(`https://wa.me/919666141369?text=${encodeURIComponent(text)}`, "_blank");
}

/* ========================
   NAVIGATE TO HOME
======================== */
function goToHome(){
  sessionStorage.setItem("openPopup", "true");
  window.location.href = "https://dglvinterior.com/";
}

/* ========================
   INIT
======================== */
buildSlider();

</script>
</body>
</html>
