<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DGLV Interior Gallery</title>

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- SAME FONT (NO CHANGE) -->
<style>
@font-face{
  font-family: "kitamiw01";
  src: url("fonts/kitamiw01-regular.ttf") format("truetype");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"kitamiw01", Arial, sans-serif;
}

body{
  background:#f8fafc;
}

/* BACK BUTTON */
.back-btn{
  display:inline-block;
  margin:20px;
  padding:10px 22px;
  border-radius:999px;
  border:2px solid #082e3b;
  color:#082e3b;
  font-weight:900;
  text-decoration:none;
  transition:0.3s;
}
.back-btn:hover{
  background:#082e3b;
  color:#fff;
}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
}
.header h1{
  font-size:32px;
  margin-bottom:10px;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap:18px;
  padding:20px;
}

.card{
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
  transition:0.3s;
}

.card:hover img{
  transform:scale(1.08);
}

/* BUTTON (OVAL FIX) */
.btn{
  display:inline-block;
  margin:30px auto;
  padding:12px 28px;
  border-radius:999px;
  background:#082e3b;
  color:#fff;
  border:2px solid #082e3b;
  font-weight:900;
  cursor:pointer;
  transition:0.3s;
}
.btn:hover{
  background:#fff;
  color:#082e3b;
}

/* POPUP */
.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:#fff;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:400px;
}

.popup-box input,
.popup-box select{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

.close{
  float:right;
  cursor:pointer;
  font-size:20px;
}
</style>

</head>

<body>

<!-- BACK BUTTON -->
<a href="/" class="back-btn">
  <i class="fa-solid fa-arrow-left"></i> Back to Main Menu
</a>

<!-- HEADER -->
<div class="header">
  <h1>Our Interior Gallery</h1>
</div>

<!-- GALLERY -->
<div class="gallery">

  <div class="card"><img src="images/living1.jpg"></div>
  <div class="card"><img src="images/kitchen1.jpg"></div>
  <div class="card"><img src="images/bedroom1.jpg"></div>
  <div class="card"><img src="images/wardrobe1.jpg"></div>
  <div class="card"><img src="images/ceiling1.jpg"></div>
  <div class="card"><img src="images/office1.jpg"></div>

</div>

<!-- BUTTON -->
<div style="text-align:center;">
  <button class="btn" onclick="openPopup()">Get Free Consultation</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <span class="close" onclick="closePopup()">&times;</span>
    <h3>Get Quote</h3>

    <input type="text" placeholder="Name">
    <input type="tel" placeholder="Phone">

    <select>
      <option>Select Service</option>
      <option>Home Interior</option>
      <option>Kitchen</option>
    </select>

    <button class="btn">Submit</button>
  </div>
</div>

<!-- SCRIPT -->
<script>
function openPopup(){
  document.getElementById("popup").style.display="flex";
}
function closePopup(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
