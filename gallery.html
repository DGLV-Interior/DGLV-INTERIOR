<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGLV INTERIOR - Gallery</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f8fafc;
}

.header{
  background:#0E3A43;
  color:white;
  padding:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
}

.gallery-buttons{
  text-align:center;
  margin:30px 0;
}

.gallery-buttons button{
  padding:10px 16px;
  margin:6px;
  border:none;
  cursor:pointer;
  background:#0E3A43;
  color:white;
  font-weight:bold;
  border-radius:25px;
}

.gallery-buttons button:hover{
  background:black;
}

.slider{
  width:90%;
  max-width:950px;
  margin:auto;
  overflow:hidden;
  border-radius:20px;
  border:1px solid rgba(0,0,0,0.1);
  background:white;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.slider-track{
  display:flex;
  transition:transform 0.7s ease-in-out;
}

.slider-track img{
  width:100%;
  height:500px;
  object-fit:cover;
  flex-shrink:0;
}

.back-btn{
  display:block;
  text-align:center;
  margin:25px auto;
  width:200px;
  padding:12px;
  border-radius:30px;
  background:black;
  color:white;
  text-decoration:none;
  font-weight:bold;
}

.back-btn:hover{
  background:#0E3A43;
}
</style>
</head>

<body>

<div class="header">DGLV INTERIOR - Our Gallery</div>

<div class="gallery-buttons">
  <button onclick="showCategory('living')">Living Room</button>
  <button onclick="showCategory('kitchen')">Modular Kitchen</button>
  <button onclick="showCategory('bedroom')">Bedroom</button>
  <button onclick="showCategory('wardrobe')">Wardrobe</button>
  <button onclick="showCategory('ceiling')">False Ceiling</button>
  <button onclick="showCategory('office')">Office Interior</button>
</div>

<div class="slider">
  <div class="slider-track" id="sliderTrack"></div>
</div>

<a class="back-btn" href="index.html">⬅ Back to Home</a>

<script>
const galleryImages = {
  living: ["images/living1.jpg", "images/living2.jpg", "images/living3.jpg"],
  kitchen: ["images/kitchen1.jpg", "images/kitchen2.jpg", "images/kitchen3.jpg"],
  bedroom: ["images/bedroom1.jpg", "images/bedroom2.jpg", "images/bedroom3.jpg"],
  wardrobe: ["images/wardrobe1.jpg", "images/wardrobe2.jpg", "images/wardrobe3.jpg"],
  ceiling: ["images/ceiling1.jpg", "images/ceiling2.jpg", "images/ceiling3.jpg"],
  office: ["images/office1.jpg", "images/office2.jpg", "images/office3.jpg"]
};

let currentCategory="living";
let currentIndex=0;
let sliderInterval;

const sliderTrack=document.getElementById("sliderTrack");

function loadImages(category){
  sliderTrack.innerHTML="";

  galleryImages[category].forEach(img=>{
    let imageElement=document.createElement("img");
    imageElement.src=img;
    sliderTrack.appendChild(imageElement);
  });

  currentIndex=0;
  sliderTrack.style.transform="translateX(0%)";
}

function nextSlide(){
  let totalImages=galleryImages[currentCategory].length;
  currentIndex++;

  if(currentIndex>=totalImages){
    currentIndex=0;
  }

  sliderTrack.style.transform="translateX(-"+(currentIndex*100)+"%)";
}

function showCategory(category){
  currentCategory=category;
  loadImages(category);

  clearInterval(sliderInterval);
  sliderInterval=setInterval(nextSlide,2500);
}

loadImages("living");
sliderInterval=setInterval(nextSlide,2500);
</script>

</body>
</html>
