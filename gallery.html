<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGLV Interior Gallery</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

@font-face{
  font-family:"kitamiw01";
  src:url("fonts/kitamiw01-regular.ttf");
}

:root{
  --navy:#082e3b;
  --gold:#b99474;
  --bg:#f0eeeb;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"kitamiw01", serif;
}

body{
  background:var(--bg);
}

/* HEADER */
.header{
  background:#efefef;
  padding:6px 28px;
  border-top:4px solid #0b3c48;
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo img{
  height:48px;
  display:block;
}

/* BUTTON */
.header-btn{
  padding:12px 28px;
  border-radius:999px;
  background:#b99474;
  color:#fff;
  border:none;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
  transition:.3s;
}

.header-btn:hover{
  background:var(--navy);
}

/* MAIN */
.main-content{
  padding:30px 20px;
}

/* CATEGORY */
.categories{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:25px;
}

.cat-btn{
  padding:10px 18px;
  border-radius:999px;
  border:1px solid var(--navy);
  background:var(--navy);
  color:#fff;
  font-weight:900;
  cursor:pointer;
  transition:.3s;
}

.cat-btn i{
  margin-right:6px;
}

.cat-btn:hover,
.cat-btn.active{
  background:var(--gold);
  border-color:var(--gold);
}

/* SLIDER */
.slider-wrap{
  position:relative;
  overflow:hidden;
  border-radius:22px;
  box-shadow:0 15px 60px rgba(0,0,0,0.2);
}

.slider-track{
  display:flex;
  transition:.5s;
}

.slide{
  min-width:100%;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:#000;
}

.slide::before{
  content:'';
  position:absolute;
  inset:0;
  background-image:inherit;
  background-size:cover;
  background-position:center;
  filter:blur(25px);
  transform:scale(1.1);
}

.slide img{
  position:relative;
  width:100%;
  height:55vh;
  min-height:350px;
  max-height:600px;
  object-fit:contain;
}

/* ARROWS */
.nav-arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:52px;
  height:52px;
  border-radius:50%;
  background:var(--navy);
  color:#fff;
  border:none;
  cursor:pointer;
  z-index:5;
  transition:.3s;
}

.nav-arrow:hover{
  background:var(--gold);
}

.prev{ left:15px; }
.next{ right:15px; }

/* DOTS */
.dots{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
}

.dot{
  width:10px;
  height:10px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,0.5);
  cursor:pointer;
}

.dot.active{
  width:28px;
  border-radius:20px;
  background:var(--gold);
}

/* BACK BUTTON */
.back-row{
  text-align:center;
  margin:35px 0 15px;
}

.back-btn{
  padding:14px 38px;
  background:var(--navy);
  color:#fff;
  border-radius:999px;
  text-decoration:none;
  font-weight:900;
  transition:.3s;
}

.back-btn:hover{
  background:var(--gold);
}

/* MOBILE */
@media(max-width:768px){

  .header{
    padding:8px 15px;
  }

  .logo img{
    height:40px;
  }

  .header-btn{
    padding:10px 18px;
    font-size:14px;
  }

  .slide img{
    height:45vh;
  }

  .categories{
    gap:8px;
  }

  .cat-btn{
    font-size:14px;
    padding:8px 14px;
  }

}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">

    <div class="logo">
      <img src="images/logo-full.png" alt="">
    </div>

    <button class="header-btn" onclick="goToHome()">
      Get Free Consultation →
    </button>

  </div>
</div>

<!-- MAIN -->
<div class="main-content">

  <div class="categories">

    <button class="cat-btn active" onclick="changeCategory(0,this)">
      <i class="fa-solid fa-couch"></i> Living Room
    </button>

    <button class="cat-btn" onclick="changeCategory(1,this)">
      <i class="fa-solid fa-kitchen-set"></i> Modular Kitchen
    </button>

    <button class="cat-btn" onclick="changeCategory(2,this)">
      <i class="fa-solid fa-bed"></i> Bedroom
    </button>

    <button class="cat-btn" onclick="changeCategory(3,this)">
      <i class="fa-solid fa-door-closed"></i> Wardrobe
    </button>

    <button class="cat-btn" onclick="changeCategory(4,this)">
      <i class="fa-solid fa-layer-group"></i> False Ceiling
    </button>

    <button class="cat-btn" onclick="changeCategory(5,this)">
      <i class="fa-solid fa-building"></i> Office Interior
    </button>

  </div>

  <div class="slider-wrap">

    <div class="slider-track" id="sliderTrack"></div>

    <button class="nav-arrow prev" onclick="prevSlide()">
      <i class="fa fa-chevron-left"></i>
    </button>

    <button class="nav-arrow next" onclick="nextSlide()">
      <i class="fa fa-chevron-right"></i>
    </button>

    <div class="dots" id="dotsContainer"></div>

  </div>

  <div class="back-row">
    <a href="https://dglvinterior.com/" class="back-btn">
      Back to Home
    </a>
  </div>

</div>

<script>

function goToHome(){
  localStorage.setItem("openForm","yes");
  window.location.href="https://dglvinterior.com/";
}

/* SLIDER */
const images=[

["images/living1.jpg","images/living2.jpg","images/living3.jpg"],

["images/kitchen1.jpg","images/kitchen2.jpg","images/kitchen3.jpg"],

["images/bedroom1.jpg","images/bedroom2.jpg","images/bedroom3.jpg"],

["images/wardrobe1.jpg","images/wardrobe2.jpg","images/wardrobe3.jpg"],

["images/ceiling1.jpg","images/ceiling2.jpg","images/ceiling3.jpg"],

["images/office1.jpg","images/office2.jpg","images/office3.jpg"]

];

let currentCategory=0;
let currentSlide=0;

function changeCategory(i,btn){

  currentCategory=i;
  currentSlide=0;

  document.querySelectorAll(".cat-btn")
  .forEach(b=>b.classList.remove("active"));

  btn.classList.add("active");

  buildSlider();
}

function buildSlider(){

  const track=document.getElementById("sliderTrack");
  const dots=document.getElementById("dotsContainer");

  track.innerHTML="";
  dots.innerHTML="";

  images[currentCategory].forEach((img,i)=>{

    track.innerHTML+=`
      <div class="slide" style="background-image:url('${img}')">
        <img src="${img}" alt="">
      </div>
    `;

    dots.innerHTML+=`
      <button class="dot ${i==0?"active":""}" 
      onclick="goToSlide(${i})"></button>
    `;

  });

  updateSlider();
}

function goToSlide(i){
  currentSlide=i;
  updateSlider();
}

function prevSlide(){
  goToSlide(currentSlide-1);
}

function nextSlide(){
  goToSlide(currentSlide+1);
}

function updateSlider(){

  const total=images[currentCategory].length;

  currentSlide=(currentSlide+total)%total;

  document.getElementById("sliderTrack")
  .style.transform=`translateX(-${currentSlide*100}%)`;

  document.querySelectorAll(".dot")
  .forEach((d,i)=>{

    d.classList.toggle("active",i===currentSlide);

  });

}

buildSlider();

</script>

</body>
</html>
