<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DGLV INTERIOR - Gallery</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== FONT ===== */
@font-face{
  font-family: "Kitami";
  src: url("./fonts/kitamiw01-regular.ttf") format("truetype");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Kitami", sans-serif;
}

/* ===== NAVBAR ===== */
.nav{
  position:sticky;
  top:0;
  background:white;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  z-index:999;
}

.logo img{
  height:55px;
}

/* ===== BUTTON ===== */
.nav-btn{
  padding:12px 22px;
  border-radius:999px;
  border:2px solid #082e3b;
  background:#082e3b;
  color:white;
  font-weight:900;
  cursor:pointer;
  transition:0.3s;
}

.nav-btn:hover{
  background:white;
  color:#082e3b;
  transform:scale(1.08);
}

/* ===== CATEGORY BUTTONS ===== */
.gallery-buttons{
  text-align:center;
  margin:25px 0;
}

.gallery-buttons button{
  padding:10px 18px;
  margin:6px;
  border-radius:25px;
  border:2px solid #082e3b;
  background:#082e3b;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.gallery-buttons button:hover{
  background:white;
  color:#082e3b;
  transform:scale(1.1);
}

/* ===== SLIDER ===== */
.slider{
  width:90%;
  max-width:950px;
  margin:auto;
  overflow:hidden;

  border-radius:30px;                 /* oval square */
  border:4px solid #082e3b;           /* blue border */

  background:white;
  box-shadow:0 12px 30px rgba(8,46,59,0.25);
}

.slider-track{
  display:flex;
  transition:transform 0.6s ease;
}

.slider-track img{
  width:100%;
  height:500px;
  object-fit:cover;
  flex-shrink:0;
}

/* ===== BACK BUTTON ===== */
.back-btn{
  display:block;
  width:220px;
  margin:30px auto;
  padding:12px;
  text-align:center;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
  border:2px solid #082e3b;
  background:#082e3b;
  color:white;
  transition:0.3s;
}

.back-btn:hover{
  background:white;
  color:#082e3b;
  transform:scale(1.08);
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
  <a href="index.html" class="logo">
    <img src="images/logo-full.png">
  </a>

  <button class="nav-btn" onclick="goToPopup()">Get Free Consultation</button>
</div>

<!-- CATEGORY -->
<div class="gallery-buttons">
  <button onclick="showCategory('living')">Living Room</button>
  <button onclick="showCategory('kitchen')">Modular Kitchen</button>
  <button onclick="showCategory('bedroom')">Bedroom</button>
  <button onclick="showCategory('wardrobe')">Wardrobe</button>
  <button onclick="showCategory('ceiling')">False Ceiling</button>
  <button onclick="showCategory('office')">Office Interior</button>
</div>

<!-- SLIDER -->
<div class="slider">
  <div class="slider-track" id="sliderTrack"></div>
</div>

<a href="index.html" class="back-btn">⬅ Back to Home</a>

<script>

/* ===== IMAGES ===== */
const galleryImages = {
  living: ["images/living1.jpg","images/living2.jpg","images/living3.jpg"],
  kitchen: ["images/kitchen1.jpg","images/kitchen2.jpg","images/kitchen3.jpg"],
  bedroom: ["images/bedroom1.jpg","images/bedroom2.jpg","images/bedroom3.jpg"],
  wardrobe: ["images/wardrobe1.jpg","images/wardrobe2.jpg","images/wardrobe3.jpg"],
  ceiling: ["images/ceiling1.jpg","images/ceiling2.jpg","images/ceiling3.jpg"],
  office: ["images/office1.jpg","images/office2.jpg","images/office3.jpg"]
};

let currentCategory = "living";
let currentIndex = 0;
let sliderTrack = document.getElementById("sliderTrack");
let sliderInterval;

/* LOAD IMAGES */
function loadImages(category){
  sliderTrack.innerHTML = "";

  galleryImages[category].forEach(src=>{
    let img = document.createElement("img");
    img.src = src;
    sliderTrack.appendChild(img);
  });

  currentIndex = 0;
  sliderTrack.style.transform = "translateX(0%)";
}

/* SLIDE */
function nextSlide(){
  let total = galleryImages[currentCategory].length;
  currentIndex = (currentIndex + 1) % total;
  sliderTrack.style.transform = `translateX(-${currentIndex * 100}%)`;
}

/* CATEGORY SWITCH */
function showCategory(cat){
  currentCategory = cat;
  loadImages(cat);

  clearInterval(sliderInterval);
  sliderInterval = setInterval(nextSlide, 2500);
}

/* INIT */
loadImages("living");
sliderInterval = setInterval(nextSlide, 2500);

function goToPopup(){
  window.location.href = "index.html?openPopup=true";
}

</script>

</body>
</html>
