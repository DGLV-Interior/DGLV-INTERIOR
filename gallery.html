<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGLV INTERIOR - Gallery</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@font-face{
  font-family:"kitamiw01";
  src:url("fonts/kitamiw01-regular.ttf") format("truetype");
}

body{
  margin:0;
  font-family:"kitamiw01", Arial, sans-serif;
  background:#f8fafc;
}

/* NAVBAR */
.nav{
  position:sticky;
  top:0;
  background:white;
  z-index:999;
  display:flex;
  align-items:center;
  padding:10px 20px;
}

.main-logo{
  height:55px;
}

.menu{
  margin-left:auto;
  display:flex;
  gap:15px;
  align-items:center;
}

.nav-btn{
  padding:10px 18px;
  border-radius:25px;
  background:#0E3A43;
  color:white;
  border:none;
  cursor:pointer;
}

/* GALLERY BUTTONS */
.gallery-buttons{
  text-align:center;
  margin:30px 0;
}

.gallery-buttons button{
  padding:10px 16px;
  margin:6px;
  border:none;
  cursor:pointer;
  background:#0E3A43;
  color:white;
  font-weight:bold;
  border-radius:25px;
}

/* SLIDER */
.slider{
  width:90%;
  max-width:900px;
  margin:auto;
  overflow:hidden;
  border-radius:20px;
  background:white;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.slider-track{
  display:flex;
  transition:0.7s;
}

.slider-track img{
  width:100%;
  height:450px;
  object-fit:cover;
}

/* BACK BUTTON */
.back-btn{
  display:block;
  text-align:center;
  margin:25px auto;
  width:200px;
  padding:12px;
  border-radius:30px;
  background:black;
  color:white;
  text-decoration:none;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
  <a href="index.html">
    <img src="images/logo-full.png" class="main-logo">
  </a>

  <div class="menu">
    <a href="index.html#services">Services</a>
    <a href="index.html#contact">Contact</a>
    <a href="gallery.html">Gallery</a>
    <button class="nav-btn">Get Free Consultation</button>
  </div>
</div>

<!-- CATEGORY BUTTONS -->
<div class="gallery-buttons">
  <button onclick="showCategory('living')">Living Room</button>
  <button onclick="showCategory('kitchen')">Modular Kitchen</button>
  <button onclick="showCategory('bedroom')">Bedroom</button>
  <button onclick="showCategory('wardrobe')">Wardrobe</button>
  <button onclick="showCategory('ceiling')">False Ceiling</button>
  <button onclick="showCategory('office')">Office Interior</button>
</div>

<!-- SLIDER -->
<div class="slider">
  <div class="slider-track" id="sliderTrack"></div>
</div>

<a class="back-btn" href="index.html">⬅ Back to Home</a>

<script>
const galleryImages = {
  living: ["images/living1.jpg","images/living2.jpg","images/living3.jpg"],
  kitchen: ["images/kitchen1.jpg","images/kitchen2.jpg","images/kitchen3.jpg"],
  bedroom: ["images/bedroom1.jpg","images/bedroom2.jpg","images/bedroom3.jpg"],
  wardrobe: ["images/wardrobe1.jpg","images/wardrobe2.jpg","images/wardrobe3.jpg"],
  ceiling: ["images/ceiling1.jpg","images/ceiling2.jpg","images/ceiling3.jpg"],
  office: ["images/office1.jpg","images/office2.jpg","images/office3.jpg"]
};

let currentCategory="living";
let currentIndex=0;

const sliderTrack=document.getElementById("sliderTrack");

function loadImages(category){
  sliderTrack.innerHTML="";
  galleryImages[category].forEach(img=>{
    let image=document.createElement("img");
    image.src=img;
    sliderTrack.appendChild(image);
  });
  currentIndex=0;
}

function nextSlide(){
  let total=galleryImages[currentCategory].length;
  currentIndex++;
  if(currentIndex>=total) currentIndex=0;
  sliderTrack.style.transform="translateX(-"+(currentIndex*100)+"%)";
}

function showCategory(category){
  currentCategory=category;
  loadImages(category);
}

setInterval(nextSlide,2500);
loadImages("living");
</script>

</body>
</html>
