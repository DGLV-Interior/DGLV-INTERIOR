<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGLV INTERIOR - Gallery</title>

<style>

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f8fafc;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 25px;
  background:white;
  border-bottom:1px solid #eee;
}

.logo img{
  height:45px;
}

.title{
  font-size:24px;
  font-weight:bold;
  color:#0E3A43;
}

.consult-btn{
  padding:8px 18px;
  border:2px solid #0E3A43;
  border-radius:25px;
  text-decoration:none;
  color:#0E3A43;
  font-weight:bold;
  cursor:pointer;
}

.consult-btn:hover{
  background:#0E3A43;
  color:white;
}

/* POPUP FORM */
.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.popup-content{
  background:white;
  padding:25px;
  border-radius:10px;
  width:300px;
}

.popup-content input,
.popup-content textarea{
  width:100%;
  margin:8px 0;
  padding:8px;
}

.close-btn{
  float:right;
  cursor:pointer;
  font-weight:bold;
}

/* GALLERY */
.gallery-buttons{
  text-align:center;
  margin:25px 0;
}

.gallery-buttons button{
  padding:8px 14px;
  margin:5px;
  border:none;
  background:#0E3A43;
  color:white;
  border-radius:20px;
  cursor:pointer;
}

.slider{
  width:90%;
  max-width:950px;
  margin:auto;
  overflow:hidden;
  border-radius:20px;
  background:white;
}

.slider-track{
  display:flex;
  transition:0.5s;
}

.slider-track img{
  width:100%;
  height:480px;
  object-fit:cover;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="logo">
    <!-- ✅ FULL LOGO -->
    <img src="images/logo-full.png">
  </div>

  <div class="title">Our Gallery</div>

  <!-- ✅ POPUP BUTTON -->
  <div class="consult-btn" onclick="openForm()">
    Get Free Consultation
  </div>

</div>

<!-- POPUP FORM -->
<div class="popup" id="popupForm">
  <div class="popup-content">
    <span class="close-btn" onclick="closeForm()">✖</span>
    <h3>Get Free Consultation</h3>
    <input type="text" placeholder="Your Name">
    <input type="tel" placeholder="Phone Number">
    <textarea placeholder="Your Requirement"></textarea>
    <button>Submit</button>
  </div>
</div>

<!-- GALLERY BUTTONS -->
<div class="gallery-buttons">
  <button onclick="showCategory('living')">Living Room</button>
  <button onclick="showCategory('kitchen')">Kitchen</button>
</div>

<!-- SLIDER -->
<div class="slider">
  <div class="slider-track" id="sliderTrack"></div>
</div>

<script>

const galleryImages = {
  living: ["images/living1.jpg","images/living2.jpg"],
  kitchen: ["images/kitchen1.jpg","images/kitchen2.jpg"]
};

let currentCategory="living";
let currentIndex=0;
let sliderInterval;

const sliderTrack=document.getElementById("sliderTrack");

function loadImages(category){
  sliderTrack.innerHTML="";
  galleryImages[category].forEach(img=>{
    let image=document.createElement("img");
    image.src=img;
    sliderTrack.appendChild(image);
  });
}

function nextSlide(){
  let total=galleryImages[currentCategory].length;
  currentIndex=(currentIndex+1)%total;
  sliderTrack.style.transform="translateX(-"+(currentIndex*100)+"%)";
}

function showCategory(cat){
  currentCategory=cat;
  loadImages(cat);
}

setInterval(nextSlide,2500);
loadImages("living");

/* POPUP FUNCTIONS */
function openForm(){
  document.getElementById("popupForm").style.display="flex";
}

function closeForm(){
  document.getElementById("popupForm").style.display="none";
}

</script>

</body>
</html>
