<!DOCTYPE html>
<html>
<head>
  <script>
    var path = window.location.pathname;

    if (path.includes("services")) {
      window.location.replace("/#services");
    } else if (path.includes("about")) {
      window.location.replace("/#contact");
    } else {
      window.location.replace("/");
    }
  </script>
</head>
<body></body>
</html>
